<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SeAuto — Prototipo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'Inter',-apple-system,system-ui,'Segoe UI',Helvetica,Arial,sans-serif;font-feature-settings:'lnum','locl';background:#f6f5f4;color:rgba(0,0,0,0.95)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d4cfc8;border-radius:9999px}
input,select,textarea,button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>

<!-- ═══════════════════════════════════════════════ CLIENT APP ═══ -->
<script type="text/babel">
const C_VEHICLES = [
  {id:1,placa:'ABJ-1583',marca:'BYD',modelo:'Yuan Pro',año:2026,color:'Azul',
   status:'En reparación',ticket:'TK-2026-0023',tecnico:'Carlos Mendoza',ingreso:'11/01/26',
   trabajos:['Puerta pos RH','Retrovisor RH','Guardafango del LH','Punta del LH','Moldura rueda post LH']},
  {id:2,placa:'PCG-4421',marca:'Toyota',modelo:'Corolla',año:2022,color:'Blanco',
   status:'Listo para entrega',ticket:'TK-2026-0018',tecnico:'Ana Torres',ingreso:'05/01/26',
   trabajos:['Revisión de frenos','Cambio de aceite y filtro']},
];
const C_PROMOS = [
  {id:1,title:'20% en alineación y balanceo',desc:'Válido hasta 28 Feb 2026',claimed:false},
  {id:2,title:'Diagnóstico gratuito',desc:'Para vehículos nuevos ingresados',claimed:true},
  {id:3,title:'3x2 en cambios de aceite',desc:'Hasta agotar stock',claimed:false},
];
const STS = {
  received: {label:'Recibido',c:'#615d59',bg:'rgba(0,0,0,.06)'},
  diagnosis:{label:'En diagnóstico',c:'#0075de',bg:'#f2f9ff'},
  repair:   {label:'En reparación',c:'#dd5b00',bg:'#fff7ed'},
  ready:    {label:'Listo para entrega',c:'#1aae39',bg:'#f0fdf4'},
  delivered:{label:'Entregado',c:'#0f7a29',bg:'#dcfce7'},
};
const STEPS = ['Recibido','Diagnóstico','Reparación','Listo','Entregado'];
const STKEYS = ['received','diagnosis','repair','ready','delivered'];
const STATUS_TO_KEY = {'Recibido':'received','En diagnóstico':'diagnosis','En reparación':'repair','Listo para entrega':'ready','Entregado':'delivered'};
const STEP_HINTS = {
  received:'Tu vehículo ya fue recibido y registrado en el sistema.',
  diagnosis:'Estamos revisando el vehículo para confirmar el alcance del trabajo.',
  repair:'El trabajo principal ya está en marcha dentro del taller.',
  ready:'Terminamos la intervención y está pasando por validación final.',
  delivered:'El proceso quedó completado y el vehículo fue entregado.',
};

const Bdg = ({s}) => <span style={{fontSize:12,fontWeight:600,padding:'4px 8px',borderRadius:9999,color:'#097fe8',background:'#f2f9ff',whiteSpace:'nowrap',letterSpacing:'0.125px'}}>{s}</span>;
const CHeader = ({title,onBack}) => (
  <div style={{background:'#31302e',color:'white',padding:'12px 16px',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
    {onBack && <button onClick={onBack} style={{background:'none',border:'none',color:'white',fontSize:18,cursor:'pointer',lineHeight:1,padding:0}}>←</button>}
    <div><div style={{fontSize:10,opacity:.5,letterSpacing:'0.125px',textTransform:'uppercase',fontWeight:600}}>SeAuto</div><div style={{fontSize:16,fontWeight:700,letterSpacing:'-0.125px'}}>{title}</div></div>
  </div>
);
const inp = {width:'100%',padding:'8px 10px',border:'1px solid #dddddd',borderRadius:4,fontSize:14,fontWeight:400,color:'rgba(0,0,0,0.9)',boxSizing:'border-box',background:'#ffffff',outline:'none'};
const lbl = {fontSize:12,fontWeight:600,color:'#615d59',display:'block',marginBottom:6,letterSpacing:'0.125px'};

const LoginScreen = ({onLogin,isReg,toggle}) => {
  const [f,sf] = React.useState({email:'',pwd:'',name:'',phone:''});
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,background:'#f6f5f4'}}>
      <div style={{textAlign:'center',marginBottom:24}}>
        <div style={{width:56,height:56,background:'#0075de',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',fontSize:28,boxShadow:'rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.027) 0px 2.025px 7.84688px, rgba(0,0,0,0.02) 0px 0.8px 2.925px, rgba(0,0,0,0.01) 0px 0.175px 1.04062px'}}>🚗</div>
        <div style={{fontSize:26,fontWeight:700,color:'rgba(0,0,0,0.95)',letterSpacing:'-0.625px'}}>SeAuto</div>
        <div style={{fontSize:14,color:'#615d59',fontWeight:400,marginTop:2}}>Portal de clientes</div>
      </div>
      <div style={{background:'white',borderRadius:12,padding:24,width:'100%',border:'1px solid rgba(0,0,0,0.1)',boxShadow:'rgba(0,0,0,0.05) 0px 23px 52px, rgba(0,0,0,0.04) 0px 14px 28px, rgba(0,0,0,0.02) 0px 7px 15px, rgba(0,0,0,0.02) 0px 3px 7px, rgba(0,0,0,0.01) 0px 1px 3px'}}>
        <div style={{fontSize:22,fontWeight:700,color:'rgba(0,0,0,.95)',marginBottom:16,letterSpacing:'-0.25px'}}>{isReg?'Crear cuenta':'Iniciar sesión'}</div>
        {isReg && <>
          <div style={{marginBottom:10}}><label style={lbl}>Nombre completo</label><input style={inp} value={f.name} onChange={e=>sf({...f,name:e.target.value})} placeholder="Juan Pérez"/></div>
          <div style={{marginBottom:10}}><label style={lbl}>Teléfono</label><input style={inp} value={f.phone} onChange={e=>sf({...f,phone:e.target.value})} placeholder="0991234567"/></div>
        </>}
        <div style={{marginBottom:10}}><label style={lbl}>Correo electrónico</label><input style={inp} value={f.email} onChange={e=>sf({...f,email:e.target.value})} placeholder="correo@email.com" type="email"/></div>
        <div style={{marginBottom:18}}><label style={lbl}>Contraseña</label><input style={inp} value={f.pwd} onChange={e=>sf({...f,pwd:e.target.value})} placeholder="••••••••" type="password"/></div>
        <button onClick={onLogin} style={{width:'100%',background:'#0075de',color:'white',border:'none',borderRadius:4,padding:11,fontSize:14,fontWeight:700,cursor:'pointer'}}>{isReg?'Registrarme':'Entrar'}</button>
        <div style={{textAlign:'center',marginTop:14,fontSize:12,color:'#615d59'}}>
          {isReg?'¿Ya tienes cuenta? ':'¿No tienes cuenta? '}
          <span onClick={toggle} style={{color:'#0075de',cursor:'pointer',fontWeight:600}}>{isReg?'Iniciar sesión':'Regístrate'}</span>
        </div>
      </div>
    </div>
  );
};

const HomeScreen = ({vehicles,onSelect}) => (
  <div style={{flex:1,overflowY:'auto'}}>
    <CHeader title="Mis Vehículos"/>
    <div style={{padding:14}}>
      {vehicles.map(v => (
        <div key={v.id} onClick={()=>onSelect(v)} style={{background:'white',borderRadius:12,padding:14,marginBottom:10,border:'1px solid rgba(0,0,0,0.08)',boxShadow:'rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.027) 0px 2.025px 7.84688px, rgba(0,0,0,0.02) 0px 0.8px 2.925px, rgba(0,0,0,0.01) 0px 0.175px 1.04062px',cursor:'pointer',borderLeft:'3px solid #0075de'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:'rgba(0,0,0,.95)'}}>{v.marca} {v.modelo}</div>
              <div style={{fontSize:11,color:'#615d59',marginTop:2}}>Placa: {v.placa} · {v.año} · {v.color}</div>
              <div style={{fontSize:11,color:'#a39e98'}}>Ticket: {v.ticket}</div>
            </div>
            <Bdg s={v.status}/>
          </div>
          <div style={{fontSize:11,color:'#615d59',display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:'#0075de',flexShrink:0}}/>
            Técnico: {v.tecnico} · Ingreso: {v.ingreso}
          </div>
        </div>
      ))}
    </div>
  </div>
);

const VehicleDetail = ({v,onBack}) => {
  const currentKey=STATUS_TO_KEY[v.status]||'received';
  const currentIndex=Math.max(STKEYS.indexOf(currentKey),0);
  const currentMeta=STS[currentKey]||STS.received;
  const nextKey=STKEYS[currentIndex+1];
  const progressWidth=STKEYS.length>1?(currentIndex/(STKEYS.length-1))*80:0;
  return (
    <div style={{flex:1,overflowY:'auto',background:'#f6f5f4'}}>
      <CHeader title={`${v.marca} ${v.modelo}`} onBack={onBack}/>
      <div style={{padding:14}}>
        <div style={{background:'#f2f9ff',border:'1px solid #bfdbfe',borderRadius:9,padding:16,marginBottom:12}}>
          <div style={{fontSize:9,fontWeight:700,color:'#097fe8',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Estado actual</div>
          <div style={{fontSize:18,fontWeight:800,color:'#31302e',marginBottom:4}}>{v.status}</div>
          <div style={{fontSize:11,color:'#615d59'}}>Ticket {v.ticket} · Técnico: {v.tecnico}</div>
        </div>
        <div style={{background:'white',borderRadius:12,padding:14,marginBottom:12,border:'1px solid rgba(0,0,0,0.08)',boxShadow:'rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.027) 0px 2.025px 7.84688px, rgba(0,0,0,0.02) 0px 0.8px 2.925px, rgba(0,0,0,0.01) 0px 0.175px 1.04062px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,marginBottom:14}}>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:'#615d59',textTransform:'uppercase',letterSpacing:'0.125px',marginBottom:6}}>Seguimiento del trabajo</div>
              <div style={{fontSize:14,fontWeight:600,color:'rgba(0,0,0,.95)',letterSpacing:'-0.125px'}}>Así avanza tu vehículo dentro del taller</div>
            </div>
            <span style={{fontSize:12,fontWeight:600,padding:'4px 8px',borderRadius:9999,color:currentMeta.c,background:currentMeta.bg,whiteSpace:'nowrap',letterSpacing:'0.125px'}}>{currentMeta.label}</span>
          </div>
          <div style={{position:'relative',padding:'2px 0 2px',marginBottom:14}}>
            <div style={{position:'absolute',top:11,left:'10%',right:'10%',height:4,background:'#e7e1d9',borderRadius:9999,transform:'translateY(-50%)',zIndex:0}}/>
            <div style={{position:'absolute',top:11,left:'10%',width:`${progressWidth}%`,height:4,background:'#0075de',borderRadius:9999,transform:'translateY(-50%)',zIndex:0}}/>
            <div style={{display:'grid',gridTemplateColumns:`repeat(${STKEYS.length},1fr)`,gap:0}}>
              {STKEYS.map((key,idx)=>{
                const done=idx<currentIndex;
                const current=idx===currentIndex;
                const meta=STS[key];
                return (
                  <div key={key} style={{textAlign:'center',position:'relative'}}>
                    <div style={{
                      width:22,height:22,borderRadius:'50%',margin:'0 auto 10px',
                      border:`2px solid ${current||done?meta.c:'rgba(0,0,0,.14)'}`,
                      background:done?meta.c:'#ffffff',
                      boxShadow:current?`0 0 0 4px #ffffff, 0 0 0 8px ${meta.bg}`:'0 0 0 4px #ffffff',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      color:done?'white':meta.c,fontSize:10,fontWeight:700,
                      position:'relative',zIndex:1
                    }}>
                      {done?'✓':current?<div style={{width:6,height:6,borderRadius:'50%',background:meta.c}}/>:''}
                    </div>
                    <div style={{fontSize:10,fontWeight:700,color:current||done?'rgba(0,0,0,.95)':'#a39e98',lineHeight:1.25,padding:'0 2px'}}>{STEPS[idx]}</div>
                    <div style={{fontSize:9,color:current?meta.c:done?'#615d59':'#a39e98',marginTop:4,fontWeight:current?700:500}}>
                      {current?'Actual':done?'Hecho':'Pendiente'}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{background:currentMeta.bg,border:`1px solid ${currentMeta.c}30`,borderRadius:12,padding:12}}>
            <div style={{fontSize:12,fontWeight:700,color:currentMeta.c,marginBottom:4}}>Ahora mismo: {currentMeta.label}</div>
            <div style={{fontSize:11,color:'#615d59',lineHeight:1.5}}>
              {STEP_HINTS[currentKey]}{nextKey?` Próximo paso: ${STS[nextKey].label}.`:''}
            </div>
          </div>
        </div>
        <div style={{background:'white',borderRadius:12,padding:14,marginBottom:12,border:'1px solid rgba(0,0,0,0.08)',boxShadow:'rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.027) 0px 2.025px 7.84688px, rgba(0,0,0,0.02) 0px 0.8px 2.925px, rgba(0,0,0,0.01) 0px 0.175px 1.04062px'}}>
          <div style={{fontSize:12,fontWeight:600,color:'#615d59',marginBottom:12,textTransform:'uppercase',letterSpacing:'0.125px'}}>Datos del vehículo</div>
          {[['Placa',v.placa],['Marca / Modelo',`${v.marca} ${v.modelo}`],['Año',v.año],['Color',v.color],['Fecha ingreso',v.ingreso],['Técnico asignado',v.tecnico]].map(([k,val])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid rgba(0,0,0,.06)',fontSize:12}}>
              <span style={{color:'#615d59'}}>{k}</span><span style={{fontWeight:600,color:'rgba(0,0,0,.95)'}}>{val}</span>
            </div>
          ))}
        </div>
        <div style={{background:'white',borderRadius:12,padding:14,border:'1px solid rgba(0,0,0,0.08)',boxShadow:'rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.027) 0px 2.025px 7.84688px, rgba(0,0,0,0.02) 0px 0.8px 2.925px, rgba(0,0,0,0.01) 0px 0.175px 1.04062px'}}>
          <div style={{fontSize:12,fontWeight:600,color:'#615d59',marginBottom:12,textTransform:'uppercase',letterSpacing:'0.125px'}}>Trabajos registrados</div>
          {v.trabajos.map((t,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid #f6f5f4',fontSize:12,color:'#31302e'}}>
              <div style={{width:5,height:5,borderRadius:'50%',background:'#0075de',flexShrink:0}}/>{t}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

const SiniestroScreen = () => {
  const [d,sd]=React.useState({placa:'',desc:'',seguro:'Sin seguro'});
  const [photos,sp]=React.useState([]);
  const [ok,sok]=React.useState(false);
  if(ok) return (
    <div style={{flex:1,display:'flex',flexDirection:'column'}}>
      <CHeader title="Reportar Siniestro"/>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,textAlign:'center'}}>
        <div style={{fontSize:44,marginBottom:12}}>✅</div>
        <div style={{fontSize:20,fontWeight:600,color:'#1aae39',marginBottom:6,letterSpacing:'-0.125px'}}>¡Solicitud enviada!</div>
        <div style={{fontSize:14,color:'#615d59',marginBottom:20,fontWeight:400,lineHeight:1.5}}>Un técnico revisará las fotos y te enviará la valorización en breve.</div>
        <button onClick={()=>{sok(false);sd({placa:'',desc:'',seguro:'Sin seguro'});sp([]);}} style={{background:'#0075de',color:'white',border:'none',borderRadius:4,padding:'9px 24px',fontSize:13,fontWeight:600,cursor:'pointer'}}>Nueva solicitud</button>
      </div>
    </div>
  );
  return (
    <div style={{flex:1,overflowY:'auto'}}>
      <CHeader title="Reportar Siniestro"/>
      <div style={{padding:14}}>
        <div style={{background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:7,padding:10,marginBottom:14,fontSize:11,color:'#8a3300'}}>📷 Adjunta fotos del daño desde varios ángulos para una valorización precisa.</div>
        <div style={{background:'white',borderRadius:12,padding:14,marginBottom:12,border:'1px solid rgba(0,0,0,0.08)',boxShadow:'rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.027) 0px 2.025px 7.84688px, rgba(0,0,0,0.02) 0px 0.8px 2.925px, rgba(0,0,0,0.01) 0px 0.175px 1.04062px'}}>
          <div style={{marginBottom:10}}><label style={lbl}>Placa del vehículo</label><input style={inp} value={d.placa} onChange={e=>sd({...d,placa:e.target.value})} placeholder="Ej. ABJ-1583"/></div>
          <div style={{marginBottom:10}}><label style={lbl}>Descripción del daño</label><textarea style={{...inp,resize:'vertical',minHeight:72}} value={d.desc} onChange={e=>sd({...d,desc:e.target.value})} placeholder="Describe el daño o incidente..."/></div>
          <div><label style={lbl}>Seguro / Broker</label>
            <select style={inp} value={d.seguro} onChange={e=>sd({...d,seguro:e.target.value})}>
              {['Sin seguro','TP Seguros','AIG Ecuador','Seguros Equinoccial'].map(x=><option key={x}>{x}</option>)}
            </select>
          </div>
        </div>
        <div style={{background:'white',borderRadius:12,padding:14,marginBottom:14,border:'1px solid rgba(0,0,0,0.08)',boxShadow:'rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.027) 0px 2.025px 7.84688px, rgba(0,0,0,0.02) 0px 0.8px 2.925px, rgba(0,0,0,0.01) 0px 0.175px 1.04062px'}}>
          <div style={{fontSize:12,fontWeight:600,color:'#615d59',marginBottom:12,textTransform:'uppercase',letterSpacing:'0.125px'}}>Fotos del daño</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            {photos.map((p,i)=>(
              <div key={p} style={{aspectRatio:'1',background:'rgba(0,0,0,.1)',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#615d59',flexDirection:'column',gap:4}}>
                <span style={{fontSize:18}}>📷</span>Foto {i+1}
              </div>
            ))}
            <div onClick={()=>sp([...photos,Date.now()])} style={{aspectRatio:'1',border:'2px dashed rgba(0,0,0,.2)',borderRadius:7,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#a39e98',gap:2}}>
              <span style={{fontSize:18}}>+</span><span style={{fontSize:9}}>Agregar</span>
            </div>
          </div>
        </div>
        <button onClick={()=>sok(true)} style={{width:'100%',background:'#0075de',color:'white',border:'none',borderRadius:4,padding:12,fontSize:14,fontWeight:700,cursor:'pointer'}}>Enviar para valorización</button>
      </div>
    </div>
  );
};

const PromosScreen = () => {
  const [pr,spr]=React.useState(C_PROMOS);
  return (
    <div style={{flex:1,overflowY:'auto'}}>
      <CHeader title="Promociones"/>
      <div style={{padding:14}}>
        {pr.map(p=>(
          <div key={p.id} style={{background:'white',borderRadius:12,padding:14,marginBottom:10,border:'1px solid rgba(0,0,0,0.08)',boxShadow:'rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.027) 0px 2.025px 7.84688px, rgba(0,0,0,0.02) 0px 0.8px 2.925px, rgba(0,0,0,0.01) 0px 0.175px 1.04062px',opacity:p.claimed?.8:1}}>
            <div style={{fontSize:14,fontWeight:700,color:'rgba(0,0,0,.95)',marginBottom:3}}>{p.title}</div>
            <div style={{fontSize:11,color:'#615d59',marginBottom:10}}>{p.desc}</div>
            {p.claimed
              ? <div style={{fontSize:12,color:'#1aae39',fontWeight:600,background:'#f0fdf4',padding:'4px 10px',borderRadius:9999,display:'inline-block',letterSpacing:'0.125px'}}>✓ Canjeada</div>
              : <button onClick={()=>spr(pr.map(x=>x.id===p.id?{...x,claimed:true}:x))} style={{background:'#0075de',color:'white',border:'none',borderRadius:4,padding:'7px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Reclamar promoción</button>
            }
          </div>
        ))}
      </div>
    </div>
  );
};

const CuponesScreen = () => {
  const [code,sc]=React.useState('');
  const [st,ss]=React.useState(null);
  return (
    <div style={{flex:1,overflowY:'auto'}}>
      <CHeader title="Cupones"/>
      <div style={{padding:14}}>
        <div style={{background:'white',borderRadius:12,padding:18,marginBottom:12,border:'1px solid rgba(0,0,0,0.08)',boxShadow:'rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.027) 0px 2.025px 7.84688px, rgba(0,0,0,0.02) 0px 0.8px 2.925px, rgba(0,0,0,0.01) 0px 0.175px 1.04062px'}}>
          <div style={{fontSize:13,fontWeight:700,color:'rgba(0,0,0,.95)',marginBottom:4}}>Canjear código</div>
          <div style={{fontSize:11,color:'#615d59',marginBottom:14}}>Ingresa el código para aplicar tu descuento.</div>
          <input value={code} onChange={e=>{sc(e.target.value.toUpperCase());ss(null);}} placeholder="Ej. SEAUTO10"

    {role !== 'cliente' && (
      <div style={{display:'flex',gap:2,background:'rgba(255,255,255,.06)',borderRadius:4,padding:3,marginLeft:4}}>
        {[['web','🖥 Web'],['mobile','📱 Móvil']].map(([p,lb])=>(
          <button key={p} onClick={()=>setPlatform(p)} style={{padding:'4px 12px',borderRadius:4,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,background:platform===p?'white':'transparent',color:platform===p?'rgba(0,0,0,0.95)':'rgba(255,255,255,.55)',transition:'all .15s',letterSpacing:'0.125px'}}>
            {lb}
          </button>
        ))}
      </div>
    )}
    <div style={{marginLeft:'auto',fontSize:12,color:'rgba(255,255,255,.35)',letterSpacing:'0.125px'}}>Abril 2026</div>
  </div>
);

const PhoneShell = ({children}) => (
  <div style={{width:380,height:'min(720px, calc(100vh - 60px))',background:'white',borderRadius:28,overflow:'hidden',boxShadow:'rgba(0,0,0,0.05) 0px 23px 52px, rgba(0,0,0,0.04) 0px 14px 28px, rgba(0,0,0,0.02) 0px 7px 15px, rgba(0,0,0,0.02) 0px 3px 7px, rgba(0,0,0,0.01) 0px 1px 3px',display:'flex',flexDirection:'column',border:'7px solid rgba(0,0,0,.95)'}}>
    <div style={{background:'#31302e',padding:'6px 22px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
      <span style={{color:'white',fontSize:11,fontWeight:600}}>9:41</span>
      <span style={{color:'white',fontSize:10,letterSpacing:1}}>▲▲▲ ■</span>
    </div>
    {children}
  </div>
);

const App = () => {
  const [role,sr]=React.useState(()=>localStorage.getItem('seauto_role')||'cliente');
  const [platform,sp]=React.useState(()=>localStorage.getItem('seauto_platform')||'web');
  const setRole=(r)=>{sr(r);localStorage.setItem('seauto_role',r);};
  const setPlatform=(p)=>{sp(p);localStorage.setItem('seauto_platform',p);};

  const ClientC=window.ClientApp, AdminC=window.AdminApp, TechC=window.TecnicoApp;
  const AdminMC=window.AdminMobileApp, TechMC=window.TecnicoMobileApp;
  const isMobile = platform==='mobile';
  const showPhone = role==='cliente' || isMobile;
  const h='calc(100vh - 38px)';

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <RoleBar role={role} setRole={setRole} platform={platform} setPlatform={setPlatform}/>
      <div style={{height:h,overflow:'hidden',display:'flex',alignItems:showPhone?'center':'stretch',justifyContent:showPhone?'center':'stretch',background:showPhone?'#f6f5f4':'#f6f5f4'}}>
        {role==='cliente'&&(
          <PhoneShell><ClientC/></PhoneShell>
        )}
        {role==='admin'&&!isMobile&&<div style={{width:'100%',height:'100%'}}><AdminC/></div>}
        {role==='admin'&&isMobile&&(
          <PhoneShell><AdminMC/></PhoneShell>
        )}
        {role==='tecnico'&&!isMobile&&<div style={{width:'100%',height:'100%'}}><TechC/></div>}
        {role==='tecnico'&&isMobile&&(
          <PhoneShell><TechMC/></PhoneShell>
        )}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
